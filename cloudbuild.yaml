steps:
  # ✅ Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - -t
      - asia-south1-docker.pkg.dev/new-project-499004/gcp-app/app:latest
      - .

  # ✅ Push Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - push
      - asia-south1-docker.pkg.dev/new-project-499004/gcp-app/app:latest

  # ✅ Deploy VM (fixed container port)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: bash
    args:
      - -c
      - |
        gcloud compute instances create my-app-vm \
          --zone=asia-south1-a \
          --machine-type=e2-medium \
          --image-family=cos-stable \
          --image-project=cos-cloud \
          --metadata=startup-script='#! /bin/bash
            docker run -d -p 80:8080 asia-south1-docker.pkg.dev/new-project-499004/gcp-app/app:latest' \
          || echo "VM already exists"

options:
  logging: CLOUD_LOGGING_ONLY
