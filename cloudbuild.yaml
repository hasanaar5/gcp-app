steps:
  # ✅ Build image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - -t
      - asia-south1-docker.pkg.dev/new-project-499004/gcp-app/app:latest
      - .

  # ✅ Push image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - push
      - asia-south1-docker.pkg.dev/new-project-499004/gcp-app/app:latest

images:
  - asia-south1-docker.pkg.dev/new-project-499004/gcp-app/app:latest

options:
  logging: CLOUD_LOGGING_ONLY
